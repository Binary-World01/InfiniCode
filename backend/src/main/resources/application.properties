# ==========================================
# CodeCollab Backend Configuration
# ==========================================

# Server
server.port=8080
spring.application.name=codecollab

# ==========================================
# Database - Using H2 for local dev
# For production: switch to PostgreSQL below
# ==========================================
spring.datasource.url=jdbc:h2:mem:codecollab;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# PostgreSQL (production - uncomment when deploying)
# spring.datasource.url=jdbc:postgresql://localhost:5432/codecollab
# spring.datasource.username=${DB_USER:postgres}
# spring.datasource.password=${DB_PASSWORD:password}
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update

# ==========================================
# Redis (optional - comment out if not installed)
# ==========================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=simple
# For production with Redis: spring.cache.type=redis

# ==========================================
# AI API Keys (set as environment variables!)
# Replace placeholder values with your real keys
# ==========================================
ai.gemini.api-key=${GEMINI_API_KEY:YOUR_GEMINI_KEY_HERE}
ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
ai.gemini.model=gemini-2.0-flash

ai.groq.api-key=${GROQ_API_KEY:YOUR_GROQ_KEY_HERE}
ai.groq.base-url=https://api.groq.com/openai/v1
ai.groq.model=llama-3.3-70b-versatile

ai.openrouter.api-key=${OPENROUTER_API_KEY:YOUR_OPENROUTER_KEY_HERE}
ai.openrouter.base-url=https://openrouter.ai/api/v1
ai.openrouter.model=deepseek/deepseek-r1:free

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=${JWT_SECRET:CodeCollabSuperSecretKeyForJWTTokenGenerationThatIsVeryLong2024}
jwt.expiration=86400000

# ==========================================
# CORS - Allow frontend origin
# ==========================================
cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500,http://127.0.0.1:3000

# ==========================================
# File Upload
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================
# Logging
# ==========================================
logging.level.com.codecollab=DEBUG
logging.level.org.springframework.web=INFO
